name: CI - Testes e Build

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          
      - name: Install dependencies
        run: php composer.phar install
        
      - name: Syntax check
        run: find . -name "*.php" -exec php -l {} \;