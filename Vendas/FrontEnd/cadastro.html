<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Vendas - Dark Theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 50%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Navegação Superior */
        .nav-header {
            background: linear-gradient(90deg, #1e3a8a 0%, #3b0764 100%);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            list-style: none;
        }

        .nav-tab {
            flex: 1;
            padding: 15px 30px;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: 500;
            color: #94a3b8;
        }

        .nav-tab:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: rgba(139, 92, 246, 0.5);
            color: #e0e0e0;
        }

        .nav-tab.active {
            background: linear-gradient(135deg, #3b0764 0%, #1e3a8a 100%);
            border-color: #8b5cf6;
            color: #fff;
            box-shadow: 0 4px 16px rgba(139, 92, 246, 0.4);
        }

        /* Layout Principal */
        .main-grid {
            display: grid;
            grid-template-columns: 350px 1fr 300px;
            gap: 20px;
        }

        /* Painéis */
        .panel {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 0.9) 100%);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid rgba(139, 92, 246, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .panel h2 {
            color: #8b5cf6;
            margin-bottom: 25px;
            font-size: 1.3rem;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(139, 92, 246, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel h2::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, #8b5cf6 0%, #3b82f6 100%);
            border-radius: 2px;
        }

        /* Formulário */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b0764 0%, #1e3a8a 100%);
            color: #fff;
            border: 2px solid rgba(139, 92, 246, 0.5);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.5);
            border-color: #8b5cf6;
        }

        .btn-secondary {
            background: rgba(15, 23, 42, 0.8);
            color: #e0e0e0;
            border: 2px solid rgba(139, 92, 246, 0.3);
            margin-bottom: 10px;
        }

        .btn-secondary:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: #8b5cf6;
        }

        .btn-danger {
            background: rgba(220, 38, 38, 0.2);
            color: #f87171;
            border: 2px solid rgba(220, 38, 38, 0.5);
            padding: 8px 12px;
            font-size: 0.85rem;
            width: auto;
        }

        .btn-danger:hover {
            background: rgba(220, 38, 38, 0.4);
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.4);
        }

        /* Tabela */
        .table-container {
            overflow-x: auto;
            max-height: calc(100vh - 250px);
            overflow-y: auto;
        }

        .products-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        .products-table th {
            background: rgba(139, 92, 246, 0.2);
            color: #8b5cf6;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
            backdrop-filter: blur(10px);
        }

        .products-table th:first-child {
            border-radius: 8px 0 0 0;
        }

        .products-table th:last-child {
            border-radius: 0 8px 0 0;
        }

        .products-table td {
            padding: 15px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.1);
            color: #e0e0e0;
        }

        .products-table tr {
            transition: all 0.3s ease;
        }

        .products-table tr:hover {
            background: rgba(139, 92, 246, 0.1);
            transform: scale(1.01);
        }

        .products-table tr:last-child td:first-child {
            border-radius: 0 0 0 8px;
        }

        .products-table tr:last-child td:last-child {
            border-radius: 0 0 8px 0;
        }

        /* Info Panels */
        .info-sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-card {
            background: linear-gradient(135deg, rgba(59, 7, 100, 0.4) 0%, rgba(30, 58, 138, 0.4) 100%);
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .info-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 32px rgba(139, 92, 246, 0.3);
            border-color: #8b5cf6;
        }

        .info-card h3 {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .buttons-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #3b0764 0%, #1e3a8a 100%);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #8b5cf6 0%, #3b82f6 100%);
        }

        /* Responsividade */
        @media (max-width: 1200px) {
            .main-grid {
                grid-template-columns: 1fr 1fr;
            }
            
            .info-sidebar {
                grid-column: 1 / -1;
                flex-direction: row;
                flex-wrap: wrap;
            }
            
            .info-card,
            .buttons-panel {
                flex: 1;
                min-width: 250px;
            }
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            
            .nav-tabs {
                flex-direction: column;
            }
        }

        /* Animações */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .panel {
            animation: fadeIn 0.5s ease;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #3b0764 0%, #1e3a8a 100%);
            color: #fff;
            padding: 16px 24px;
            border-radius: 8px;
            border: 2px solid #8b5cf6;
            box-shadow: 0 8px 32px rgba(139, 92, 246, 0.4);
            display: none;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
            }
            to {
                transform: translateX(0);
            }
        }

        .toast.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navegação -->
        <nav class="nav-header">
            <ul class="nav-tabs">
                <li class="nav-tab active" onclick="switchTab('vendas')">📊 Página de Vendas</li>
                <li class="nav-tab" onclick="switchTab('consultar')">📋 Página Consultar Registros</li>
            </ul>
        </nav>

        <!-- Conteúdo Principal -->
        <div class="main-grid" id="vendasContent">
            <!-- Registrar Produto -->
            <aside class="panel">
                <h2>Registrar Produto</h2>
                <form id="registerForm">
                    <div class="form-group">
                        <label for="nome">Nome do Produto</label>
                        <input type="text" id="nome" placeholder="Digite o nome do produto" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="categoria">Categoria</label>
                        <select id="categoria" required>
                            <option value="">Selecione...</option>
                            <option value="eletronicos">Eletrônicos</option>
                            <option value="alimentos">Alimentos</option>
                            <option value="vestuario">Vestuário</option>
                            <option value="moveis">Móveis</option>
                            <option value="esportes">Esportes</option>
                            <option value="outros">Outros</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="valor">Valor (R$)</label>
                        <input type="number" id="valor" step="0.01" placeholder="0,00" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="volume">Volume (m³)</label>
                        <input type="number" id="volume" step="0.001" placeholder="0,000" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="quantidade">Quantidade</label>
                        <input type="number" id="quantidade" placeholder="0" min="1" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        ➕ Cadastrar Produto
                    </button>
                </form>
            </aside>

            <!-- Produtos Registrados -->
            <main class="panel">
                <h2>Produtos Registrados</h2>
                <div class="table-container">
                    <table class="products-table">
                        <thead>
                            <tr>
                                <th>Produto</th>
                                <th>Categoria</th>
                                <th>Valor Unit.</th>
                                <th>Volume</th>
                                <th>Qtd</th>
                                <th>Total</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody">
                            <!-- Produtos serão inseridos via JS -->
                        </tbody>
                    </table>
                </div>
            </main>

            <!-- Sidebar Direita -->
            <div class="info-sidebar">
                <!-- Soma Total -->
                <div class="info-card">
                    <h3>💰 Soma Total</h3>
                    <div class="info-value" id="totalValue">R$ 0,00</div>
                </div>

                <!-- Volume Total -->
                <div class="info-card">
                    <h3>📦 Volume Total</h3>
                    <div class="info-value" id="totalVolume" style="font-size: 1.8rem;">0,000 m³</div>
                </div>

                <!-- Botões -->
                <div class="panel buttons-panel">
                    <h2 style="font-size: 1.1rem;">⚡ Ações</h2>
                    <button class="btn btn-secondary" onclick="exportData()">
                        📥 Exportar Dados (JSON)
                    </button>
                    <button class="btn btn-secondary" onclick="importData()">
                        📤 Importar Dados
                    </button>
                    <button class="btn btn-secondary" onclick="clearAll()">
                        🗑️ Limpar Tudo
                    </button>
                    <button class="btn btn-secondary" onclick="printReport()">
                        🖨️ Imprimir Relatório
                    </button>
                    <button class="btn btn-secondary" onclick="showStats()">
                        📈 Estatísticas
                    </button>
                </div>
            </div>
        </div>

        <!-- Página Consultar Registros (inicialmente oculta) -->
        <div class="main-grid" id="consultarContent" style="display: none;">
            <div class="panel" style="grid-column: 1 / -1;">
                <h2>📋 Consultar Registros</h2>
                <div class="form-group" style="max-width: 500px; margin-bottom: 30px;">
                    <label for="searchInput">Buscar Produto</label>
                    <input type="text" id="searchInput" placeholder="Digite o nome do produto..." onkeyup="searchProducts()">
                </div>
                <div class="table-container">
                    <table class="products-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Produto</th>
                                <th>Categoria</th>
                                <th>Valor</th>
                                <th>Volume</th>
                                <th>Qtd</th>
                                <th>Data Registro</th>
                            </tr>
                        </thead>
                        <tbody id="consultTableBody">
                            <!-- Produtos serão inseridos via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Input file oculto para importação -->
    <input type="file" id="fileInput" accept=".json" style="display: none;" onchange="handleFileImport(event)">

    <script>
        // Array para armazenar produtos
        let products = [];
        let nextId = 1;

        // Form submit
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const product = {
                id: nextId++,
                nome: document.getElementById('nome').value,
                categoria: document.getElementById('categoria').value,
                valor: parseFloat(document.getElementById('valor').value),
                volume: parseFloat(document.getElementById('volume').value),
                quantidade: parseInt(document.getElementById('quantidade').value),
                dataRegistro: new Date().toLocaleString('pt-BR')
            };

            products.push(product);
            updateTables();
            updateTotals();
            this.reset();
            showToast('✅ Produto cadastrado com sucesso!');
        });

        // Atualizar tabelas
        function updateTables() {
            const tbody = document.getElementById('productsTableBody');
            const consultTbody = document.getElementById('consultTableBody');
            
            if (products.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7">
                            <div class="empty-state">
                                <svg fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M10 2a4 4 0 00-4 4v1H5a1 1 0 00-.994.89l-1 9A1 1 0 004 18h12a1 1 0 001-1.11l-1-9A1 1 0 0015 7h-1V6a4 4 0 00-4-4zm2 5V6a2 2 0 10-4 0v1h4zm-6 3a1 1 0 112 0 1 1 0 01-2 0zm7-1a1 1 0 100 2 1 1 0 000-2z" clip-rule="evenodd"/>
                                </svg>
                                <p>Nenhum produto registrado</p>
                            </div>
                        </td>
                    </tr>
                `;
                consultTbody.innerHTML = tbody.innerHTML;
                return;
            }

            // Tabela principal
            tbody.innerHTML = products.map(p => {
                const total = p.valor * p.quantidade;
                const categorias = {
                    'eletronicos': '📱 Eletrônicos',
                    'alimentos': '🍔 Alimentos',
                    'vestuario': '👕 Vestuário',
                    'moveis': '🪑 Móveis',
                    'esportes': '⚽ Esportes',
                    'outros': '📦 Outros'
                };
                
                return `
                    <tr>
                        <td><strong>${p.nome}</strong></td>
                        <td>${categorias[p.categoria] || p.categoria}</td>
                        <td>R$ ${p.valor.toFixed(2)}</td>
                        <td>${p.volume.toFixed(3)} m³</td>
                        <td>${p.quantidade}</td>
                        <td style="color: #8b5cf6; font-weight: 600;">R$ ${total.toFixed(2)}</td>
                        <td>
                            <button class="btn btn-danger" onclick="removeProduct(${p.id})">
                                🗑️ Excluir
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');

            // Tabela de consulta
            consultTbody.innerHTML = products.map(p => `
                <tr>
                    <td>#${p.id}</td>
                    <td><strong>${p.nome}</strong></td>
                    <td>${p.categoria}</td>
                    <td>R$ ${p.valor.toFixed(2)}</td>
                    <td>${p.volume.toFixed(3)} m³</td>
                    <td>${p.quantidade}</td>
                    <td style="color: #64748b; font-size: 0.9rem;">${p.dataRegistro}</td>
                </tr>
            `).join('');
        }

        // Atualizar totais
        function updateTotals() {
            const totalValue = products.reduce((sum, p) => sum + (p.valor * p.quantidade), 0);
            const totalVolume = products.reduce((sum, p) => sum + (p.volume * p.quantidade), 0);

            document.getElementById('totalValue').textContent = `R$ ${totalValue.toFixed(2)}`;
            document.getElementById('totalVolume').textContent = `${totalVolume.toFixed(3)} m³`;
        }

        // Remover produto
        function removeProduct(id) {
            if (confirm('Tem certeza que deseja excluir este produto?')) {
                products = products.filter(p => p.id !== id);
                updateTables();
                updateTotals();
                showToast('🗑️ Produto excluído com sucesso!');
            }
        }

        // Limpar tudo
        function clearAll() {
            if (products.length === 0) {
                showToast('⚠️ Não há produtos para limpar!');
                return;
            }
            
            if (confirm(`Tem certeza que deseja limpar todos os ${products.length} produtos?`)) {
                products = [];
                nextId = 1;
                updateTables();
                updateTotals();
                showToast('🗑️ Todos os produtos foram removidos!');
            }
        }

        // Exportar dados
        function exportData() {
            if (products.length === 0) {
                showToast('⚠️ Não há dados para exportar!');
                return;
            }
            
            const data = {
                produtos: products,
                dataExportacao: new Date().toLocaleString('pt-BR'),
                totalProdutos: products.length,
                valorTotal: products.reduce((sum, p) => sum + (p.valor * p.quantidade), 0),
                volumeTotal: products.reduce((sum, p) => sum + (p.volume * p.quantidade), 0)
            };
            
            const dataStr = JSON.stringify(data, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `produtos_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('📥 Dados exportados com sucesso!');
        }

        // Importar dados
        function importData() {
            document.getElementById('fileInput').click();
        }

        function handleFileImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.produtos && Array.isArray(data.produtos)) {
                        products = data.produtos;
                        nextId = Math.max(...products.map(p => p.id), 0) + 1;
                        updateTables();
                        updateTotals();
                        showToast('📤 Dados importados com sucesso!');
                    } else {
                        throw new Error('Formato inválido');
                    }
                } catch (error) {
                    showToast('❌ Erro ao importar arquivo!');
                    console.error(error);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // Imprimir
        function printReport() {
            if (products.length === 0) {
                showToast('⚠️ Não há dados para imprimir!');
                return;
            }
            window.print();
        }

        // Estatísticas
        function showStats() {
            if (products.length === 0) {
                showToast('⚠️ Não há produtos para mostrar estatísticas!');
                return;
            }
            
            const totalProducts = products.length;
            const totalItems = products.reduce((sum, p) => sum + p.quantidade, 0);
            const totalValue = products.reduce((sum, p) => sum + (p.valor * p.quantidade), 0);
            const totalVolume = products.reduce((sum, p) => sum + (p.volume * p.quantidade), 0);
            const avgValue = totalValue / totalProducts;
            const maxValue = Math.max(...products.map(p => p.valor * p.quantidade));
            const minvalue = Math.min(...products.map(p => p.valor * p.quantidade));
            
            const stats = `📊 ESTATÍSTICAS DO SISTEMA

📦 Total de Produtos: ${totalProducts}
📊 Total de Itens: ${totalItems}
💰 Valor Total: R$ ${totalValue.toFixed(2)}
📦 Volume Total: ${totalVolume.toFixed(3)} m³
💵 Valor Médio: R$ ${avgValue.toFixed(2)}
📈 Maior Valor: R$ ${maxValue.toFixed(2)}
📉 Menor Valor: R$ ${minvalue.toFixed(2)}`;

            alert(stats);
        }

        // Busca de produtos
        function searchProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('#consultTableBody tr');
            
            rows.forEach(row => {
                const productName = row.cells[1].textContent.toLowerCase();
                if (productName.includes(searchTerm)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        }

        // Trocar abas
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.nav-tab');
            const vendasContent = document.getElementById('vendasContent');
            const consultarContent = document.getElementById('consultarContent');
            
            tabs.forEach(t => t.classList.remove('active'));
            
            if (tab === 'vendas') {
                tabs[0].classList.add('active');
                vendasContent.style.display = 'grid';
                consultarContent.style.display = 'none';
            } else {
                tabs[1].classList.add('active');
                vendasContent.style.display = 'none';
                consultarContent.style.display = 'grid';
                updateTables();
            }
        }

        // Toast notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Inicialização
        document.addEventListener('DOMContentLoaded', function() {
            updateTables();
            updateTotals();
            console.log(' Sistema de Vendas carregado com sucesso!');
            console.log(' Tema: Dark (Preto/Azul/Roxo)');
        });

        // Prevenir perda de dados
        window.addEventListener('beforeunload', function(e) {
            if (products.length > 0) {
                e.preventDefault();
                e.returnValue = '';
            }
        });
    </script>
</body>
</html>
