<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Vendas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .banner {
            background-color: #c62828;
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-radius: 4px;
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .banner:hover {
            background-color: #b71c1c;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .banner:active {
            transform: translateY(0);
        }

        /* Responsividade */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .banner {
                padding: 30px 15px;
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .banner {
                padding: 25px 10px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="banner" onclick="handleClick(1)">
            Registro de vendas com produtos da venda
        </div>
        
        <div class="banner" onclick="handleClick(2)">
            Registro de vendas com produtos da venda
        </div>
        
        <div class="banner" onclick="handleClick(3)">
            Registro de vendas com produtos da venda
        </div>
        
        <div class="banner" onclick="handleClick(4)">
            Registro de vendas com produtos da venda
        </div>
        
        <div class="banner" onclick="handleClick(5)">
            Registro de vendas com produtos da venda
        </div>
    </div>

    <script>
        function handleClick(number) {
            console.log('Banner clicado:', number);
            // Adicione sua lógica aqui
            alert('Você clicou no banner ' + number);
        }

        // Você pode adicionar mais funcionalidades aqui
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Template carregado com sucesso!');
        });
    </script>
</body>
</html>
