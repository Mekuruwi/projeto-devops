version: '3.8'
services:
  app:
    build: .
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_NAME=projeto
      - DB_USER=dev
      - DB_PASSWORD=dev123
    depends_on:
      - db
  
  db:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: projeto
      MYSQL_USER: dev
      MYSQL_PASSWORD: dev123
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
  - db_data:/var/lib/mysql
  - ./init-db:/docker-entrypoint-initdb.d